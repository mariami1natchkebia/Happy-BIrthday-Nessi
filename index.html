<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nessi's Tower!</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        body {
            background-color: #fff5f8;
            margin: 0;
            padding: 0;
            overflow: hidden;
            font-family: 'Comic Sans MS', cursive;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
        }

        /* --- სტიკერების ზუსტი განლაგება --- */
        .sticker {
            position: fixed;
            z-index: 1;
            pointer-events: none;
            width: 80px; /* მობილურისთვის ოპტიმალური ზომა */
        }

        /* ზედა სტიკერები */
        #mermaid { top: 5vh; left: 2vw; transform: rotate(-10deg); }
        #cool { top: 5vh; right: 2vw; transform: rotate(10deg); }

        /* შუა/გვერდითა სტიკერები */
        #gameon { top: 40vh; right: 1vw; width: 65px; transform: rotate(-5deg); }
        #hug { bottom: 25vh; left: 1vw; width: 90px; }

        /* ქვედა სტიკერები */
        #princess { bottom: 2vh; left: 3vw; width: 70px; }
        #picnic { bottom: 2vh; right: 3vw; width: 80px; }
        #witchy { bottom: 1vh; left: 50%; transform: translateX(-50%); width: 60px; }

        /* --- UI ელემენტები --- */
        .header { margin-top: 15px; z-index: 10; text-align: center; }
        h1 { color: #ff1493; font-size: 1.6rem; margin: 0; }
        
        .score-box {
            background: white;
            color: #ff1493;
            padding: 5px 15px;
            border-radius: 20px;
            border: 2px solid #ff80bf;
            margin: 10px 0;
            z-index: 10;
            font-weight: bold;
        }

        /* სათამაშო ზონა - ცენტრში, რომ სტიკერებს არ შეეხოს */
        #game-container {
            position: relative;
            width: 70vw; /* შევიწროებულია, რომ გვერდითა სტიკერებს არ გადაეფაროს */
            height: 40vh;
            border: 2px dashed #ff80bf;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.3);
            display: flex;
            justify-content: center;
            align-items: flex-end;
            z-index: 5;
        }

        /* კექსები */
        .falling-cupcake {
            position: absolute;
            width: 45px;
            height: 45px;
            background-size: contain;
            background-repeat: no-repeat;
            animation: fall linear forwards;
            z-index: 20;
        }

        @keyframes fall {
            0% { transform: translateY(-50px); }
            100% { transform: translateY(40vh); }
        }

        #tower {
            display: flex;
            flex-direction: column-reverse;
            align-items: center;
        }

        .tower-piece {
            width: 50px;
            height: 45px;
            background-size: contain;
            background-repeat: no-repeat;
            margin-bottom: -10px;
        }

        /* ქვედა ტორტი */
        .cake-bottom {
            margin-top: 20px;
            width: 80px;
            height: 40px;
            background: #ff80bf;
            border-radius: 10px;
            position: relative;
            z-index: 10;
        }
        .icing { height: 15px; background: white; border-radius: 10px; width: 100%; position: absolute; top: -5px; }

        #cat {
            position: absolute;
            width: 80px;
            bottom: 0;
            right: -100px;
            transition: right 0.5s ease;
            z-index: 30;
        }
        .cat-show { right: 10px !important; }
    </style>
</head>
<body>

    <img src="mermaid_nessi.png" id="mermaid" class="sticker">
    <img src="cool_nessi.png" id="cool" class="sticker">
    <img src="family_hug.png" id="hug" class="sticker">
    <img src="game_on.png" id="gameon" class="sticker">
    <img src="princess_moment.png" id="princess" class="sticker">
    <img src="family_picnic.png" id="picnic" class="sticker">
    <img src="witchy_vibes.png" id="witchy" class="sticker">

    <div class="header">
        <h1>Nessi's Tower!</h1>
    </div>

    <div class="score-box">Level: <span id="score">0</span></div>

    <div id="game-container">
        <div id="tower"></div>
        <img src="pusheen_PNG18.png" id="cat">
    </div>

    <div class="cake-bottom">
        <div class="icing"></div>
    </div>

    <script>
        let level = 0;
        let eating = false;
        const cupcakeImgs = [
            'cupcale-removebg-preview.png',
            'cupcale-removebg-preview (1).png',
            'cupcale-removebg-preview (2).png',
            'cupcale-removebg-preview (3).png'
        ];

        function spawn() {
            if (eating || level >= 5) return;
            const c = document.createElement('div');
            c.className = 'falling-cupcake';
            const img = cupcakeImgs[Math.floor(Math.random() * cupcakeImgs.length)];
            c.style.backgroundImage = `url('${img}')`;
            c.style.left = Math.random() * 80 + '%';
            c.style.animationDuration = (Math.random() * 1 + 2) + 's';
            
            c.onclick = () => {
                if (!eating) {
                    level++;
                    document.getElementById('score').innerText = level;
                    const piece = document.createElement('div');
                    piece.className = 'tower-piece';
                    piece.style.backgroundImage = `url('${img}')`;
                    document.getElementById('tower').appendChild(piece);
                    if (level === 5) win();
                }
                c.remove();
            };
            document.getElementById('game-container').appendChild(c);
            setTimeout(() => c.remove(), 3000);
        }

        function win() {
            confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
            eating = true;
            setTimeout(() => {
                const cat = document.getElementById('cat');
                cat.classList.add('cat-show');
                const interval = setInterval(() => {
                    const t = document.getElementById('tower');
                    if (t.children.length > 0) t.lastChild.remove();
                    else {
                        clearInterval(interval);
                        cat.classList.remove('cat-show');
                        level = 0;
                        document.getElementById('score').innerText = 0;
                        eating = false;
                    }
                }, 400);
            }, 1000);
        }

        setInterval(spawn, 1000);
    </script>
</body>
</html>
