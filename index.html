<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nessi's Birthday Tower!</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --pink: #ff80bf;
            --dark-pink: #ff1493;
            --soft-white: #fff5f8;
        }

        body {
            background-color: var(--soft-white);
            margin: 0;
            padding: 0;
            font-family: 'Comic Sans MS', cursive;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow: hidden; 
            touch-action: none; 
        }

        /* --- Sticker Layer --- */
        .sticker-layer { 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            z-index: 1; 
            pointer-events: none; 
        }

        .sticker { 
            position: absolute; 
            width: 110px;
            transition: all 0.3s ease;
        }

        /* განლაგება ისრების მიხედვით */
        #mermaid { top: 15%; left: -20px; transform: rotate(-15deg); } /* მარცხნივ ზემოთ */
        #cool { top: 12%; right: -15px; transform: rotate(15deg); }   /* მარჯვნივ ზემოთ */
        #hug { bottom: 25%; left: -25px; transform: rotate(10deg); width: 130px; } /* მარცხნივ ქვემოთ */
        #gameon { bottom: 20%; right: -20px; transform: rotate(-10deg); } /* მარჯვნივ ქვემოთ */
        
        #princess { bottom: 5%; left: 5%; width: 80px; }
        #picnic { bottom: 5%; right: 5%; width: 90px; }
        #witchy { bottom: 2%; left: 50%; transform: translateX(-50%); width: 70px; }

        /* Responsive მობილურისთვის */
        @media (max-width: 480px) {
            .sticker { width: 90px; }
            #mermaid { left: -10px; top: 18%; }
            #cool { right: -10px; top: 15%; }
            #hug { left: -15px; bottom: 15%; width: 110px; }
            #gameon { right: -15px; bottom: 18%; }
        }

        /* --- UI --- */
        .header { text-align: center; padding: 5px; z-index: 10; }
        h1 { color: var(--dark-pink); font-size: 1.8rem; text-shadow: 2px 2px white; margin: 5px 0;}

        .score-box {
            color: var(--dark-pink);
            font-weight: bold;
            z-index: 10;
            background: rgba(255, 255, 255, 0.8);
            padding: 5px 15px;
            border-radius: 20px;
            margin-bottom: 10px;
        }

        #game-container {
            position: relative;
            width: 85vw;
            max-width: 320px;
            height: 40vh;
            background: rgba(255, 255, 255, 0.4);
            border: 3px dashed var(--pink);
            border-radius: 25px;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            z-index: 5;
        }

        .falling-cupcake {
            position: absolute;
            font-size: 40px;
            cursor: pointer;
            z-index: 20;
            animation: fall linear forwards;
        }

        @keyframes fall {
            0% { transform: translateY(-50px) rotate(0deg); }
            100% { transform: translateY(45vh) rotate(360deg); }
        }

        #tower {
            display: flex;
            flex-direction: column-reverse;
            align-items: center;
            width: 80px;
            margin-bottom: 5px;
        }

        .tower-cake {
            font-size: 35px;
            line-height: 22px; 
            animation: stack-in 0.2s ease-out;
        }

        @keyframes stack-in {
            0% { transform: translateY(-20px); opacity: 0; }
            100% { transform: translateY(0); opacity: 1; }
        }

        .cake-section { height: 15vh; display: flex; flex-direction: column; justify-content: flex-end; z-index: 10; margin-bottom: 10px;}
        .cake { width: 90px; height: 45px; background: var(--pink); border-radius: 10px; position: relative;}
        .icing { position: absolute; top: -5px; width: 100%; height: 18px; background: white; border-radius: 10px; }
        .candle { position: absolute; top: -22px; left: 50%; transform: translateX(-50%); width: 6px; height: 22px; background: #7ce2ff; }
        .flame { position: absolute; top: -12px; left: 50%; transform: translateX(-50%); width: 10px; height: 15px; background: orange; border-radius: 50%; animation: flicker 0.4s infinite alternate; }
        
        @keyframes flicker { from { opacity: 0.8; } to { opacity: 1; transform: translateX(-50%) scale(1.1); } }
        .hidden { visibility: hidden; }

        #cat {
            position: absolute;
            font-size: 80px;
            bottom: 10px;
            right: -120px;
            transition: right 0.5s ease-in-out;
            z-index: 30;
        }
        .cat-appear { right: 10px !important; }
    </style>
</head>
<body onmousemove="spawnSparkle(event)" ontouchmove="spawnSparkleTouch(event)">

    <div class="sticker-layer">
        <img src="mermaid_nessi.png" id="mermaid" class="sticker">
        <img src="cool_nessi.png" id="cool" class="sticker">
        <img src="family_hug.png" id="hug" class="sticker">
        <img src="game_on.png" id="gameon" class="sticker">
        <img src="princess_moment.png" id="princess" class="sticker">
        <img src="family_picnic.png" id="picnic" class="sticker">
        <img src="witchy_vibes.png" id="witchy" class="sticker">
    </div>

    <div class="header">
        <h1 id="main-title">Nessi's Tower! 🧁</h1>
    </div>

    <div class="cake-section" onclick="blowCandle()">
        <div class="cake">
            <div class="icing"></div>
            <div class="candle"><div class="flame" id="flame"></div></div>
        </div>
    </div>

    <div class="score-box">Level: <span id="score">0</span></div>
    
    <div id="game-container">
        <div id="tower"></div>
        <div id="cat">🐱</div>
    </div>

    <script>
        let level = 0;
        let isEating = false;
        const tower = document.getElementById('tower');
        const scoreDisplay = document.getElementById('score');
        const cat = document.getElementById('cat');
        const mainTitle = document.getElementById('main-title');
        const container = document.getElementById('game-container');

        function blowCandle() {
            document.getElementById('flame').classList.add('hidden');
            confetti({ particleCount: 100, origin: { y: 0.3 } });
            setTimeout(() => document.getElementById('flame').classList.remove('hidden'), 3000);
        }

        const cupcakeEmojis = ['🧁', '🍰', '🎂', '🍩'];

        function spawnCupcake() {
            if (isEating || level >= 5) return;
            const cc = document.createElement('div');
            cc.className = 'falling-cupcake';
            cc.innerText = cupcakeEmojis[Math.floor(Math.random() * cupcakeEmojis.length)];
            const rect = container.getBoundingClientRect();
            cc.style.left = Math.random() * (rect.width - 40) + 'px';
            cc.style.animationDuration = (Math.random() * 1 + 2) + 's';
            cc.onclick = () => { if(!isEating) addToTower(cc.innerText); cc.remove(); };
            container.appendChild(cc);
            setTimeout(() => { if(cc.parentNode) cc.remove(); }, 3000);
        }

        function addToTower(emoji) {
            if (level >= 5) return;
            level++;
            scoreDisplay.innerText = level;
            const tC = document.createElement('div');
            tC.className = 'tower-cake';
            tC.innerText = emoji;
            tower.appendChild(tC);
            confetti({ particleCount: 10, scalar: 0.7, origin: { y: 0.8 } });
            if (level === 5) {
                mainTitle.innerText = "WELL DONE! 🎉";
                confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
                setTimeout(catAttack, 1500); 
            }
        }

        function catAttack() {
            isEating = true;
            cat.classList.add('cat-appear');
            const eatInterval = setInterval(() => {
                if (tower.children.length > 0) {
                    tower.lastChild.remove();
                } else {
                    clearInterval(eatInterval);
                    setTimeout(() => {
                        cat.classList.remove('cat-appear');
                        level = 0;
                        scoreDisplay.innerText = level;
                        isEating = false;
                        mainTitle.innerText = "Nessi's Tower! 🧁";
                    }, 1000);
                }
            }, 400);
        }

        setInterval(spawnCupcake, 1000);

        function drawSparkle(x, y) {
            const s = document.createElement('div');
            s.innerHTML = '✨';
            s.style.position = 'fixed';
            s.style.left = x + 'px';
            s.style.top = y + 'px';
            s.style.pointerEvents = 'none';
            document.body.appendChild(s);
            setTimeout(() => s.remove(), 400);
        }
        function spawnSparkle(e) { drawSparkle(e.clientX, e.clientY); }
        function spawnSparkleTouch(e) { drawSparkle(e.touches[0].clientX, e.touches[0].clientY); }
    </script>
</body>
</html>
