<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nessi's Birthday Tower!</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --pink: #ff80bf;
            --dark-pink: #ff1493;
            --soft-white: #fff5f8;
        }

        body {
            background-color: var(--soft-white);
            margin: 0;
            padding: 0;
            font-family: 'Comic Sans MS', cursive;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            touch-action: none;
        }

        /* --- სტიკერების განლაგება --- */
        .sticker-layer {
            position: fixed;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        .sticker {
            position: absolute;
            width: 80px;
            filter: drop-shadow(2px 2px 4px rgba(0,0,0,0.1));
            transition: all 0.5s ease;
        }

        /* დესკტოპზე: სათამაშო ჩარჩოსთან ახლოს (შუისკენ) */
        #mermaid { top: 20%; left: calc(50% - 240px); transform: rotate(-10deg); }
        #cool { top: 20%; left: calc(50% + 160px); transform: rotate(10deg); }
        #hug { top: 50%; left: calc(50% - 260px); width: 100px; }
        #gameon { top: 50%; left: calc(50% + 180px); width: 70px; }
        #princess { bottom: 15%; left: calc(50% - 220px); }
        #picnic { bottom: 15%; left: calc(50% + 140px); width: 90px; }
        #witchy { bottom: 5%; left: 50%; transform: translateX(-50%); width: 65px; }

        /* მობილურზე: გადანაწილება თავისუფალ ადგილებზე */
        @media (max-width: 600px) {
            .sticker { width: 65px; }
            #mermaid { top: 2%; left: 2%; }
            #cool { top: 2%; right: 2%; left: auto; }
            #hug { top: 85%; left: 5%; width: 80px; }
            #gameon { top: 35%; right: 2%; left: auto; width: 60px; }
            #princess { top: 35%; left: 2%; }
            #picnic { top: 85%; right: 5%; left: auto; width: 75px; }
            #witchy { bottom: 1%; left: 50%; }
        }

        /* --- ტორტი ზემოთ --- */
        .cake-header {
            margin-top: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 10;
        }

        .cake-top {
            width: 70px;
            height: 35px;
            background: var(--pink);
            border-radius: 8px;
            position: relative;
            box-shadow: 0 4px 0 #e669a2;
        }

        .icing {
            position: absolute;
            top: -3px;
            width: 100%;
            height: 12px;
            background: white;
            border-radius: 8px;
        }

        .candle {
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            width: 5px;
            height: 15px;
            background: #7ce2ff;
        }

        .flame {
            position: absolute;
            top: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 8px;
            height: 12px;
            background: orange;
            border-radius: 50% 50% 20% 20%;
            box-shadow: 0 0 10px orange;
            animation: flicker 0.2s infinite alternate;
        }

        @keyframes flicker {
            0% { transform: translateX(-50%) scale(1); opacity: 0.9; }
            100% { transform: translateX(-50%) scale(1.1); opacity: 1; }
        }

        /* --- თამაშის ზონა --- */
        .header-title { color: var(--dark-pink); font-size: 1.4rem; margin: 5px 0; z-index: 10; }

        #game-container {
            position: relative;
            width: 75vw;
            max-width: 300px;
            height: 45vh;
            background: rgba(255, 255, 255, 0.5);
            border: 3px dashed var(--pink);
            border-radius: 20px;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            z-index: 5;
            margin-top: 10px;
        }

        .score-display {
            color: var(--dark-pink);
            font-weight: bold;
            font-size: 0.9rem;
            background: white;
            padding: 4px 12px;
            border-radius: 15px;
            border: 1px solid var(--pink);
            margin-bottom: 5px;
            z-index: 10;
        }

        /* კექსები */
        .falling-cupcake {
            position: absolute;
            width: 45px;
            height: 45px;
            background-size: contain;
            background-repeat: no-repeat;
            animation: fall linear forwards;
            z-index: 20;
            cursor: pointer;
        }

        @keyframes fall {
            0% { transform: translateY(-50px); }
            100% { transform: translateY(45vh); }
        }

        #tower {
            display: flex;
            flex-direction: column-reverse;
            align-items: center;
            z-index: 15;
            padding-bottom: 5px;
        }

        .tower-cake {
            width: 50px;
            height: 40px;
            background-size: contain;
            background-repeat: no-repeat;
            margin-bottom: -12px;
        }

        #cat {
            position: absolute;
            width: 80px;
            bottom: 0;
            right: -120px;
            transition: right 0.5s ease;
            z-index: 30;
        }
        .cat-attack { right: 10px !important; }
    </style>
</head>
<body>

    <div class="sticker-layer">
        <img src="mermaid_nessi.png" id="mermaid" class="sticker">
        <img src="cool_nessi.png" id="cool" class="sticker">
        <img src="family_hug.png" id="hug" class="sticker">
        <img src="game_on.png" id="gameon" class="sticker">
        <img src="princess_moment.png" id="princess" class="sticker">
        <img src="family_picnic.png" id="picnic" class="sticker">
        <img src="witchy_vibes.png" id="witchy" class="sticker">
    </div>

    <div class="cake-header">
        <div class="cake-top">
            <div class="icing"></div>
            <div class="candle"><div class="flame"></div></div>
        </div>
        <h1 class="header-title">Nessi's Tower!</h1>
        <div class="score-display">Level: <span id="score">0</span></div>
    </div>

    <div id="game-container">
        <div id="tower"></div>
        <img src="pusheen_PNG18.png" id="cat">
    </div>

    <script>
        let level = 0;
        let active = true;
        const tower = document.getElementById('tower');
        const scoreBox = document.getElementById('score');
        const cat = document.getElementById('cat');
        const cupcakeImgs = [
            'cupcale-removebg-preview.png',
            'cupcale-removebg-preview (1).png',
            'cupcale-removebg-preview (2).png',
            'cupcale-removebg-preview (3).png'
        ];

        function spawn() {
            if (!active || level >= 5) return;
            const c = document.createElement('div');
            c.className = 'falling-cupcake';
            const img = cupcakeImgs[Math.floor(Math.random() * cupcakeImgs.length)];
            c.style.backgroundImage = `url('${img}')`;
            c.style.left = Math.random() * 80 + '%';
            c.style.animationDuration = (Math.random() * 1 + 2) + 's';

            c.onclick = () => {
                if (active && level < 5) {
                    level++;
                    scoreBox.innerText = level;
                    const p = document.createElement('div');
                    p.className = 'tower-cake';
                    p.style.backgroundImage = `url('${img}')`;
                    tower.appendChild(p);
                    
                    if (level === 5) {
                        confetti({ particleCount: 150, spread: 60, origin: { y: 0.3 } });
                        active = false;
                        setTimeout(eatAll, 2000);
                    }
                }
                c.remove();
            };
            document.getElementById('game-container').appendChild(c);
            setTimeout(() => c.remove(), 3000);
        }

        function eatAll() {
            cat.classList.add('cat-attack');
            const interval = setInterval(() => {
                if (tower.children.length > 0) tower.lastChild.remove();
                else {
                    clearInterval(interval);
                    cat.classList.remove('cat-attack');
                    level = 0;
                    scoreBox.innerText = 0;
                    active = true;
                }
            }, 400);
        }

        setInterval(spawn, 1000);
    </script>
</body>
</html>
